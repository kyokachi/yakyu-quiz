<script>
(function() {
  let allPlayers = [];
  let quizPlayers = [];
  let currentIndex = 0;
  let revealed = false;
  let correctCount = 0;
  let quizLimit = 10;
  let quizDifficulty = '';
  let quizTeam = '';

  const $ = id => document.getElementById(id);

  // DOM refs
  const elLoading  = $('loading');
  const elHome     = $('home');
  const elQuiz     = $('quiz');
  const elFinish   = $('finish');

  // Load data
  fetch('players.json')
    .then(r => r.json())
    .then(data => {
      allPlayers = data.players;
      elLoading.style.display = 'none';
      elHome.style.display = 'block';
      updateCount();
    })
    .catch(err => {
      elLoading.innerHTML = '<p style="color:#e55">データの読み込みに失敗しました。<br>players.json が同じフォルダにあるか確認してください。</p>';
      console.error(err);
    });

  // Filter logic
  function getFilteredPlayers() {
    const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
    const status = document.querySelector('input[name="status"]:checked').value;
    const decade = document.querySelector('input[name="decade"]:checked').value;
    const team = document.querySelector('input[name="team"]:checked').value;
    return allPlayers.filter(p => {
      if (difficulty === 'easy' && !p.famous) return false;
      if (difficulty === 'normal' && !p.famous && !p.normal) return false;
      if (difficulty === 'legend' && !p.legend) return false;
      if (difficulty !== 'legend' && p.legend && !p.famous && !p.normal && p.debutYear < 2000) return false;
      if (status !== 'all' && p.status !== status) return false;
      if (decade !== 'all') {
        const d = parseInt(decade);
        if (p.debutYear < d || p.debutYear >= d + 10) return false;
      }
      if (team !== 'all' && (!p.teams || !p.teams.includes(team))) return false;
      return true;
    });
  }

  function updateCount() {
    const filtered = getFilteredPlayers();
    const countVal = document.querySelector('input[name="count"]:checked').value;
    const limit = countVal === 'all' ? filtered.length : Math.min(parseInt(countVal), filtered.length);
    const label = filtered.length === 0 ? '対象: 0 人' : `対象: ${filtered.length} 人（${limit}問 出題）`;
    $('player-count').textContent = label;
    $('btn-start').disabled = filtered.length === 0;
  }

  // Listen to filter changes
  document.querySelectorAll('input[name="difficulty"], input[name="status"], input[name="decade"], input[name="team"], input[name="count"]').forEach(el => {
    el.addEventListener('change', updateCount);
  });

  // Shuffle
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Start quiz
  $('btn-start').addEventListener('click', () => {
    const filtered = getFilteredPlayers();
    if (filtered.length === 0) return;
    const countVal = document.querySelector('input[name="count"]:checked').value;
    quizLimit = countVal === 'all' ? filtered.length : Math.min(parseInt(countVal), filtered.length);
    quizPlayers = shuffle(filtered).slice(0, quizLimit);
    currentIndex = 0;
    correctCount = 0;
    quizDifficulty = document.querySelector('input[name="difficulty"]:checked').value;
    quizTeam = document.querySelector('input[name="team"]:checked').value;
    showScreen('quiz');
    renderQuestion();
  });

  // Screen switching
  function showScreen(name) {
    elHome.style.display = 'none';
    elQuiz.style.display = 'none';
    elFinish.style.display = 'none';
    if (name === 'home') elHome.style.display = 'block';
    else if (name === 'quiz') elQuiz.style.display = 'block';
    else if (name === 'finish') elFinish.style.display = 'block';
  }

  // Render question
  function renderQuestion() {
    const p = quizPlayers[currentIndex];
    revealed = false;

    // Counter
    $('counter').textContent = `${currentIndex + 1} / ${quizPlayers.length} 問目`;

    // Meta badges
    const meta = $('card-meta');
    meta.innerHTML = '';
    const statusBadge = document.createElement('span');
    statusBadge.className = 'badge ' + (p.status === 'active' ? 'badge-active' : 'badge-retired');
    statusBadge.textContent = p.status === 'active' ? '現役' : '引退';
    meta.appendChild(statusBadge);

    if (p.debutYear) {
      const debutBadge = document.createElement('span');
      debutBadge.className = 'badge badge-debut';
      debutBadge.textContent = `${p.debutYear}年デビュー`;
      meta.appendChild(debutBadge);
    }

    // Career list
    const list = $('career-list');
    list.innerHTML = '';

    const careerItems = [
      { icon: '🏫', label: '高校', value: p.career.highSchool },
      { icon: '🎓', label: '大学', value: p.career.university },
      { icon: '🏢', label: '社会人', value: p.career.amateur },
    ];

    careerItems.forEach(item => {
      if (!item.value) return;
      const vals = Array.isArray(item.value) ? item.value : [item.value];
      const li = document.createElement('li');
      li.className = 'career-item';
      li.innerHTML = `
        <span class="career-icon">${item.icon}</span>
        <span class="career-label">${item.label}</span>
        <span class="career-value">${vals.map(v => esc(v)).join(' → ')}</span>
      `;
      list.appendChild(li);
    });

    // Pro teams
    if (p.career.proTeams && p.career.proTeams.length > 0) {
      const li = document.createElement('li');
      li.className = 'career-item';
      let teamsHtml = '<ul class="pro-team-list">';
      p.career.proTeams.forEach(t => {
        teamsHtml += `<li class="pro-team-item">${esc(t.team)} <span class="team-years">(${esc(t.years)})</span></li>`;
      });
      teamsHtml += '</ul>';
      li.innerHTML = `
        <span class="career-icon">⚾</span>
        <span class="career-label">プロ</span>
        <span class="career-value">${teamsHtml}</span>
      `;
      list.appendChild(li);
    }

    // Reset answer area
    $('btn-reveal').style.display = 'inline-block';
    $('answer-name').textContent = '';
    $('answer-name').classList.remove('show');
    $('judgment-buttons').style.display = 'none';
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Reveal answer
  $('btn-reveal').addEventListener('click', () => {
    if (revealed) return;
    revealed = true;
    const p = quizPlayers[currentIndex];
    $('btn-reveal').style.display = 'none';
    $('answer-name').textContent = p.name;
    requestAnimationFrame(() => {
      $('answer-name').classList.add('show');
    });
    $('judgment-buttons').style.display = 'flex';
  });

  // Advance to next question or finish
  function advanceQuiz() {
    currentIndex++;
    if (currentIndex >= quizPlayers.length) {
      const total = quizPlayers.length;
      $('score-text').textContent = `${total}問中 ${correctCount}問 正解！`;
      $('finish-stats').textContent = `全 ${total} 問を完了しました`;
      showScreen('finish');
    } else {
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // Knew it
  $('btn-knew').addEventListener('click', () => {
    correctCount++;
    advanceQuiz();
  });

  // Didn't know
  $('btn-didnt').addEventListener('click', () => {
    advanceQuiz();
  });

  // Back to home
  $('btn-back').addEventListener('click', () => showScreen('home'));

  // Finish screen buttons
  $('btn-retry').addEventListener('click', () => {
    quizPlayers = shuffle(quizPlayers);
    currentIndex = 0;
    correctCount = 0;
    showScreen('quiz');
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  $('btn-home-finish').addEventListener('click', () => {
    showScreen('home');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Share text
  function getShareText() {
    const total = quizPlayers.length;
    const pageURL = location.href;
    const diffLabels = { easy: 'かんたん', normal: 'ふつう', all: 'げきむず', legend: 'レジェンド' };
    const diffLabel = diffLabels[quizDifficulty] || '';
    let conditions = `【${diffLabel}】`;
    if (quizTeam !== 'all') {
      const teamEl = document.querySelector(`input[name="team"][value="${quizTeam}"]`);
      const teamLabel = teamEl ? teamEl.nextElementSibling.textContent : quizTeam;
      conditions += `【${teamLabel}】`;
    }
    return `プロ野球 経歴クイズ${conditions}で${total}問中${correctCount}問正解しました！\n${pageURL}`;
  }

  // Share on X
  $('btn-share').addEventListener('click', () => {
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(getShareText()), '_blank');
  });

  // Share on LINE
  $('btn-share-line').addEventListener('click', () => {
    window.open('https://line.me/R/share?text=' + encodeURIComponent(getShareText()), '_blank');
  });
})();
</script>
</body>
</html>
